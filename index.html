<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱时间表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ffd1ff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .heart {
            font-size: 3em;
            animation: heartbeat 1s infinite;
            display: block;
            margin-bottom: 20px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-section label {
            display: block;
            color: #666;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .datetime-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input[type="datetime-local"] {
            padding: 15px 20px;
            border: 2px solid #ffb6c1;
            border-radius: 15px;
            font-size: 1.1em;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="datetime-local"]:focus {
            border-color: #ff6b6b;
        }

        button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .timer-display {
            display: none;
        }

        .timer-display.active {
            display: block;
        }

        .current-time {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            font-size: 1.5em;
        }

        .current-time span {
            font-weight: bold;
            font-size: 1.8em;
        }

        .love-duration {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .time-box {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            padding: 20px 10px;
            border-radius: 15px;
            color: white;
        }

        .time-box .number {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
        }

        .time-box .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .total-seconds {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2em;
        }

        .total-seconds span {
            font-weight: bold;
            font-size: 1.5em;
        }

        .celebration {
            margin-top: 20px;
            color: #ff6b6b;
            font-size: 1.1em;
            display: none;
        }

        .celebration.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="heart">💕</span>
        <h1>恋爱时间表</h1>

        <div class="input-section" id="inputSection">
            <label>选择你们在一起的第一天</label>
            <div class="datetime-input">
                <input type="datetime-local" id="loveStart">
            </div>
            <br><br>
            <button onclick="startTimer()">开始计时 💖</button>
        </div>

        <div class="timer-display" id="timerDisplay">
            <div class="current-time">
                现在时间：<span id="currentTime"></span>
            </div>

            <div class="love-duration">
                <div class="time-box">
                    <span class="number" id="years">0</span>
                    <span class="label">年</span>
                </div>
                <div class="time-box">
                    <span class="number" id="months">0</span>
                    <span class="label">月</span>
                </div>
                <div class="time-box">
                    <span class="number" id="days">0</span>
                    <span class="label">天</span>
                </div>
                <div class="time-box">
                    <span class="number" id="hours">0</span>
                    <span class="label">时</span>
                </div>
                <div class="time-box">
                    <span class="number" id="minutes">0</span>
                    <span class="label">分</span>
                </div>
                <div class="time-box">
                    <span class="number" id="seconds">0</span>
                    <span class="label">秒</span>
                </div>
            </div>

            <div class="total-seconds">
                一共在一起：<span id="totalSeconds">0</span> 秒
            </div>

            <div class="celebration" id="celebration"></div>
        </div>
    </div>

    <script>
        let loveStartTime = null;
        let timerInterval = null;

        function formatDateTime(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        function updateCurrentTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = formatDateTime(now);
        }

        function getTimeDiff(start, end) {
            let years = end.getFullYear() - start.getFullYear();
            let months = end.getMonth() - start.getMonth();
            let days = end.getDate() - start.getDate();
            let hours = end.getHours() - start.getHours();
            let minutes = end.getMinutes() - start.getMinutes();
            let seconds = end.getSeconds() - start.getSeconds();

            if (seconds < 0) {
                seconds += 60;
                minutes--;
            }
            if (minutes < 0) {
                minutes += 60;
                hours--;
            }
            if (hours < 0) {
                hours += 24;
                days--;
            }
            if (days < 0) {
                const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
                days += prevMonth.getDate();
                months--;
            }
            if (months < 0) {
                months += 12;
                years--;
            }

            return { years, months, days, hours, minutes, seconds };
        }

        function updateLoveTimer() {
            if (!loveStartTime) return;

            const now = new Date();
            const diff = getTimeDiff(loveStartTime, now);
            const totalSeconds = Math.floor((now - loveStartTime) / 1000);

            document.getElementById('years').textContent = diff.years;
            document.getElementById('months').textContent = diff.months;
            document.getElementById('days').textContent = diff.days;
            document.getElementById('hours').textContent = diff.hours;
            document.getElementById('minutes').textContent = diff.minutes;
            document.getElementById('seconds').textContent = diff.seconds;
            document.getElementById('totalSeconds').textContent = totalSeconds.toLocaleString();

            updateCelebration(diff);
        }

        function updateCelebration(diff) {
            const celebration = document.getElementById('celebration');
            const totalDays = diff.years * 365 + diff.months * 30 + diff.days;

            let message = '';
            if (totalDays > 365 && totalDays % 365 < 30) {
                message = '🎉 恋爱 ' + diff.years + ' 周年纪念日快乐！💕';
            } else if (totalDays > 30 && diff.months === 0 && diff.days === 0) {
                message = '💖 ' + (diff.years * 12 + diff.months) + ' 个月纪念日！';
            } else if (totalDays > 100 && totalDays % 100 < 30) {
                message = '💝 在一起 ' + totalDays + ' 天啦！';
            }

            celebration.textContent = message;
            celebration.className = 'celebration' + (message ? ' active' : '');
        }

        function startTimer() {
            const input = document.getElementById('loveStart');
            const value = input.value;

            if (!value) {
                alert('请选择你们在一起的第一天 💕');
                return;
            }

            loveStartTime = new Date(value);

            if (loveStartTime > new Date()) {
                alert('恋爱开始时间不能是未来哦 💕');
                return;
            }

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('timerDisplay').classList.add('active');

            updateCurrentTime();
            updateLoveTimer();

            timerInterval = setInterval(() => {
                updateCurrentTime();
                updateLoveTimer();
            }, 1000);
        }
    </script>
</body>
</html>
